<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
	
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	
    <title>Saludo Personalizado</title>

</head>
<body>
	<h1>
		Hola <span th:text="${persona.nombre + ' ' + persona.apellidos}"></span>
	</h1>
	<h2>
		Nota Media: <span th:text="#{persona.notaMedia, 2}"></span>
	</h2>
	<h2>
		Fecha Nacimineto: <span th:text="${persona.fechaNaz}"></span>
	</h2>
</body>
</html>
